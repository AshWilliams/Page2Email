<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page2Email</title>
  <link rel="stylesheet" href="popup.css" />
  <link rel="stylesheet" href="../lib/select2.min.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <img src="../icons/email.png" alt="Page2Email" class="logo" />
      <h1 class="title">Page2Email</h1>
    </header>

    <!-- Capture format -->
    <section class="section" aria-labelledby="format-label">
      <label class="field-label" id="format-label" for="format-select">Capture format <span class="help-icon" data-tooltip="Choose Screenshot to capture the visible area as a PNG image, or PDF to generate a full-page PDF document.">?</span></label>
      <select id="format-select" class="input select-method">
        <option value="screenshot" data-icon="../icons/screenshot.png" selected>Screenshot (PNG)</option>
        <option value="pdf" data-icon="../icons/pdf.png">PDF (full page)</option>
      </select>
      <label class="checkbox-option" id="save-screenshot-option">
        <input type="checkbox" id="save-screenshot" />
        <span>Save screenshot to disk</span>
      </label>
    </section>

    <!-- Email method -->
    <section class="section" aria-labelledby="method-label">
      <label class="field-label" id="method-label" for="method-select">Send via <span class="help-icon" data-tooltip="Select how to send. Default email app opens your system mail client. Gmail and Outlook open a compose tab in your browser.">?</span></label>
      <select id="method-select" class="input select-method">
        <option value="mailto" data-icon="../icons/emailapp.png" selected>Default email app</option>
        <option value="gmail" data-icon="../icons/gmail.png">Gmail</option>
        <option value="outlook" data-icon="../icons/outlook.png">Outlook</option>
      </select>
    </section>

    <!-- Recipients -->
    <section class="section">
      <label class="field-label" for="recipients">To (comma-separated) <span class="help-icon" data-tooltip="Enter one or more email addresses separated by commas. Use the Me button to quickly fill in your saved address.">?</span></label>
      <div class="input-row">
        <input
          type="text"
          id="recipients"
          class="input"
          placeholder="you@example.com, team@company.com"
        />
        <button type="button" id="btn-send-to-me" class="btn-secondary" title="Use saved 'Send to me' address">
          Me
        </button>
      </div>
    </section>

    <!-- Subject -->
    <section class="section">
      <label class="field-label" for="subject">Subject <span class="help-icon" data-tooltip="Auto-generated from the page title, hostname, and date. You can edit it before sending.">?</span></label>
      <input type="text" id="subject" class="input" placeholder="Auto-generated from page title" />
    </section>

    <!-- Notes -->
    <section class="section">
      <label class="field-label" for="notes">Notes / body <span class="help-icon" data-tooltip="Optional text added to the email body. Use it for expense codes, ticket numbers, or any context you want to include.">?</span></label>
      <textarea
        id="notes"
        class="input textarea"
        rows="3"
        placeholder="Add a note, expense code, ticket number…"
      ></textarea>
    </section>

    <!-- Save "me" address -->
    <section class="section section-me" id="section-save-me" hidden>
      <label class="field-label" for="my-email">From email address <span class="help-icon" data-tooltip="Save your email address so you can quickly fill the From field by clicking the Me button.">?</span></label>
      <div class="input-row">
        <input type="email" id="my-email" class="input" placeholder="your@email.com" />
        <button type="button" id="btn-save-me" class="btn-secondary">Save</button>
      </div>
      <p class="hint" id="save-me-status"></p>
    </section>

    <!-- Actions -->
    <div class="actions">
      <button type="button" id="btn-capture" class="btn-primary">
        <span id="btn-capture-text">📸 Capture &amp; Send</span>
        <span id="btn-spinner" class="spinner" hidden aria-label="Capturing…"></span>
      </button>
    </div>

    <!-- Status / feedback -->
    <div id="status" class="status" role="status" aria-live="polite" hidden></div>

    <!-- Settings toggle -->
    <div class="settings-row">
      <button type="button" id="btn-toggle-settings" class="btn-link">⚙️ My email address</button>
    </div>
  </div>

  <script src="../lib/jquery.min.js"></script>
  <script src="../lib/select2.min.js"></script>
  <script src="utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
